name = "isf"
main = ".svelte-kit/cloudflare/_worker.js"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "isf"
database_id = "local-dev-placeholder"
migrations_dir = "db/migrations"

[[kv_namespaces]]
binding = "KV"
id = "local-dev-placeholder"

[triggers]
crons = ["* * * * *", "0 * * * *"]

[vars]
ENVIRONMENT = "development"
# Runtime "learning" (post-turn auto-saves with embedding+features per save) is
# off by default. Curated pool material is generated offline (see references/)
# and shipped as seed. Set to "true" only if you want runtime growth and you
# have Workers Paid for the Neuron budget.
ENABLE_LEARNING = "false"

# Vectorize and AI bindings are remote-only — added only in staging/production.
# Local dev/tests use mocks (lib/server/pool/vectorize-mock.ts, lib/server/llm/mock.ts).

[env.production]
name = "isf"
[env.production.vars]
ENVIRONMENT = "production"
ENABLE_LEARNING = "false"
[[env.production.d1_databases]]
binding = "DB"
database_name = "isf"
database_id = "d5cfc870-5396-49a6-89d0-aafc4b6a313e"
migrations_dir = "db/migrations"
[[env.production.kv_namespaces]]
binding = "KV"
id = "faaae1e7e5cd4930b6ef1c117d385977"
[[env.production.vectorize]]
binding = "POOL_VECTORS"
index_name = "pool-entries"
[env.production.ai]
binding = "AI"

[env.staging]
name = "isf-staging"
[env.staging.vars]
ENVIRONMENT = "staging"
ENABLE_LEARNING = "false"
[[env.staging.d1_databases]]
binding = "DB"
database_name = "isf-staging"
database_id = "PLACEHOLDER_FILL_AFTER_d1_create"
migrations_dir = "db/migrations"
[[env.staging.kv_namespaces]]
binding = "KV"
id = "PLACEHOLDER_FILL_AFTER_kv_create"
[[env.staging.vectorize]]
binding = "POOL_VECTORS"
index_name = "pool-entries-staging"
[env.staging.ai]
binding = "AI"
